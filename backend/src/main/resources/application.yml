spring:
  mvc:
    pathmatch:
      use-suffix-pattern: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketprime}
    username: ${SPRING_DATASOURCE_USERNAME:marketprime}
    password: ${SPRING_DATASOURCE_PASSWORD:marketprime123}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    # Mínimo 32 caracteres para HMAC-SHA256
    # En producción esto va en variable de entorno, nunca en el repo
    secret: ${JWT_SECRET:"marketprime-super-secret-jwt-key-change-in-prod-2024"}
    access-token-expiration-ms: 3600000         # 15 minutos
    refresh-token-expiration-ms: 604800000  # 7 días

