spring:
  mvc:
    pathmatch:
      use-suffix-pattern: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://marketprime.database.windows.net:1433;databaseName=marketprimebd;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
    username: ${SPRING_DATASOURCE_USERNAME:marketprime}
    password: ${SPRING_DATASOURCE_PASSWORD:PrimeMarket123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    # Mínimo 32 caracteres para HMAC-SHA256
    # En producción esto va en variable de entorno, nunca en el repo
    secret: ${JWT_SECRET:"marketprime-super-secret-jwt-key-change-in-prod-2024"}
    access-token-expiration-ms: 3600000         # 15 minutos
    refresh-token-expiration-ms: 604800000  # 7 días

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME:marketprime-images}
